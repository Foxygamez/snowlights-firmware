name: Compile and Release Firmware

on:
  push:
    branches: [ main ]
    paths: [ '**.ino' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          mkdir -p $HOME/bin
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH
          $HOME/bin/arduino-cli version

      - name: Configure and install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32 --skip-installation-of-libraries

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED"
          arduino-cli lib install "MPU6050_light"

      - name: Compile sketch
        run: |
          SKETCH=$(find . -name "*.ino" | head -1)
          SKETCH_DIR=$(dirname "$SKETCH")
          echo "Compiling: $SKETCH"
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            "$SKETCH_DIR"
          echo "Build complete:"
          ls ./build/

      - name: Get firmware version
        id: version
        run: |
          VERSION=$(grep -o 'FW_VERSION "[^"]*"' *.ino | grep -o '"[^"]*"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Firmware version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Firmware v${{ steps.version.outputs.version }}
          body: Auto-compiled SnowLights firmware
          files: ./build/*.bin
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
